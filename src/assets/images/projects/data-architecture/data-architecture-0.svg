<svg xmlns="http://www.w3.org/2000/svg" width="800" height="500" viewBox="0 0 800 500">
  <rect width="800" height="500" fill="#09090b"/>
  <rect x="40" y="40" width="720" height="420" rx="12" fill="#18181b" stroke="#27272a" stroke-width="1.5"/>
  <rect x="40" y="40" width="720" height="52" rx="12" fill="#581c87"/>
  <rect x="40" y="68" width="720" height="24" fill="#581c87"/>
  <text x="72" y="72" font-family="monospace" font-size="14" fill="#e9d5ff" font-weight="bold">FINANCE DATA ARCHITECTURE EXPLORATION</text>
  <rect x="620" y="52" width="120" height="22" rx="4" fill="#7c3aed" opacity="0.5"/>
  <text x="636" y="67" font-family="monospace" font-size="9" fill="#e9d5ff">⚗ Prototype</text>
  <!-- Architecture diagram -->
  <!-- Layer 1: Sources -->
  <text x="72" y="118" font-family="monospace" font-size="10" fill="#a78bfa">DATA SOURCES</text>
  <rect x="72" y="126" width="100" height="34" rx="5" fill="#3f3f46" stroke="#6d28d9" stroke-width="1"/>
  <text x="98" y="147" font-family="monospace" font-size="9" fill="#e4e4e7">Sheets 1</text>
  <rect x="184" y="126" width="100" height="34" rx="5" fill="#3f3f46" stroke="#6d28d9" stroke-width="1"/>
  <text x="210" y="147" font-family="monospace" font-size="9" fill="#e4e4e7">Sheets 2</text>
  <rect x="296" y="126" width="100" height="34" rx="5" fill="#3f3f46" stroke="#6d28d9" stroke-width="1"/>
  <text x="318" y="147" font-family="monospace" font-size="9" fill="#e4e4e7">NetSuite GL</text>
  <rect x="408" y="126" width="100" height="34" rx="5" fill="#3f3f46" stroke="#6d28d9" stroke-width="1"/>
  <text x="426" y="147" font-family="monospace" font-size="9" fill="#e4e4e7">AR Reports</text>
  <!-- Arrows down -->
  <line x1="122" y1="162" x2="122" y2="198" stroke="#7c3aed" stroke-width="1.5" stroke-dasharray="4"/>
  <line x1="234" y1="162" x2="234" y2="198" stroke="#7c3aed" stroke-width="1.5" stroke-dasharray="4"/>
  <line x1="346" y1="162" x2="346" y2="198" stroke="#7c3aed" stroke-width="1.5" stroke-dasharray="4"/>
  <line x1="458" y1="162" x2="458" y2="198" stroke="#7c3aed" stroke-width="1.5" stroke-dasharray="4"/>
  <polygon points="118,196 122,204 126,196" fill="#7c3aed"/>
  <polygon points="230,196 234,204 238,196" fill="#7c3aed"/>
  <polygon points="342,196 346,204 350,196" fill="#7c3aed"/>
  <polygon points="454,196 458,204 462,196" fill="#7c3aed"/>
  <!-- Layer 2: Ingestion -->
  <text x="72" y="218" font-family="monospace" font-size="10" fill="#a78bfa">SCHEDULED INGESTION</text>
  <rect x="72" y="226" width="500" height="34" rx="5" fill="#4c1d95" stroke="#7c3aed" stroke-width="1"/>
  <text x="278" y="247" font-family="monospace" font-size="9" fill="#e9d5ff">Python Scheduler → Parquet / BigQuery Loader</text>
  <line x1="322" y1="262" x2="322" y2="298" stroke="#7c3aed" stroke-width="1.5" stroke-dasharray="4"/>
  <polygon points="318,296 322,304 326,296" fill="#7c3aed"/>
  <!-- Layer 3: Storage -->
  <text x="72" y="320" font-family="monospace" font-size="10" fill="#a78bfa">ANALYTICAL LAYER</text>
  <rect x="72" y="328" width="220" height="34" rx="5" fill="#4c1d95" stroke="#7c3aed" stroke-width="1"/>
  <text x="128" y="349" font-family="monospace" font-size="9" fill="#e9d5ff">BigQuery</text>
  <rect x="310" y="328" width="100" height="34" rx="5" fill="#3f3f46" stroke="#6d28d9" stroke-width="0.8"/>
  <text x="325" y="349" font-family="monospace" font-size="9" fill="#e4e4e7">DuckDB</text>
  <rect x="428" y="328" width="140" height="34" rx="5" fill="#3f3f46" stroke="#6d28d9" stroke-width="0.8"/>
  <text x="452" y="349" font-family="monospace" font-size="9" fill="#e4e4e7">Parquet Files</text>
  <!-- Arrow to dashboard -->
  <line x1="182" y1="364" x2="182" y2="400" stroke="#7c3aed" stroke-width="1.5" stroke-dasharray="4"/>
  <polygon points="178,398 182,406 186,398" fill="#7c3aed"/>
  <!-- Layer 4: Output -->
  <text x="72" y="420" font-family="monospace" font-size="10" fill="#a78bfa">DASHBOARDS</text>
  <rect x="72" y="426" width="150" height="28" rx="5" fill="#4c1d95" stroke="#7c3aed" stroke-width="1"/>
  <text x="106" y="444" font-family="monospace" font-size="9" fill="#e9d5ff">Internal UI</text>
  <rect x="240" y="426" width="150" height="28" rx="5" fill="#3f3f46" stroke="#6d28d9" stroke-width="0.8"/>
  <text x="278" y="444" font-family="monospace" font-size="9" fill="#e4e4e7">Power BI</text>
  <!-- Note column -->
  <rect x="600" y="126" width="150" height="328" rx="8" fill="#27272a"/>
  <text x="616" y="152" font-family="monospace" font-size="9" fill="#a78bfa" font-weight="bold">DESIGN GOALS</text>
  <text x="616" y="174" font-family="monospace" font-size="8" fill="#e4e4e7">• Consolidate</text>
  <text x="616" y="192" font-family="monospace" font-size="8" fill="#e4e4e7">  multiple sheets</text>
  <text x="616" y="214" font-family="monospace" font-size="8" fill="#e4e4e7">• Scheduled</text>
  <text x="616" y="232" font-family="monospace" font-size="8" fill="#e4e4e7">  data ingestion</text>
  <text x="616" y="254" font-family="monospace" font-size="8" fill="#e4e4e7">• Partitioned</text>
  <text x="616" y="272" font-family="monospace" font-size="8" fill="#e4e4e7">  storage</text>
  <text x="616" y="294" font-family="monospace" font-size="8" fill="#e4e4e7">• Faster query</text>
  <text x="616" y="312" font-family="monospace" font-size="8" fill="#e4e4e7">  performance</text>
  <text x="616" y="334" font-family="monospace" font-size="8" fill="#e4e4e7">• Dashboard</text>
  <text x="616" y="352" font-family="monospace" font-size="8" fill="#e4e4e7">  improvement</text>
</svg>