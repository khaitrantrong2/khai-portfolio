  <polygon points="220,135 232,140 220,145" fill="#60a5fa"/>
  <rect x="234" y="120" width="120" height="40" rx="6" fill="#1e40af" opacity="0.6"/>
  <text x="258" y="143" font-family="monospace" font-size="10" fill="#bfdbfe">DuckDB Parse</text>
  <line x1="356" y1="140" x2="394" y2="140" stroke="#60a5fa" stroke-width="1.5" stroke-dasharray="4"/>
  <polygon points="394,135 406,140 394,145" fill="#60a5fa"/>
  <rect x="408" y="120" width="120" height="40" rx="6" fill="#1e40af" opacity="0.6"/>
  <text x="432" y="143" font-family="monospace" font-size="10" fill="#bfdbfe">Rule Engine</text>
  <line x1="530" y1="140" x2="568" y2="140" stroke="#60a5fa" stroke-width="1.5" stroke-dasharray="4"/>
