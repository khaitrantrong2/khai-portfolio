  <rect x="40" y="68" width="720" height="24" fill="#1e40af"/>
  <text x="72" y="72" font-family="monospace" font-size="14" fill="#bfdbfe" font-weight="bold">GL ANALYSIS ENGINE</text>
  <text x="620" y="72" font-family="monospace" font-size="11" fill="#bfdbfe">Python + DuckDB</text>
  <!-- Pipeline diagram -->
  <rect x="60" y="120" width="120" height="40" rx="6" fill="#1e40af" opacity="0.6"/>
