  <text x="605" y="143" font-family="monospace" font-size="10" fill="#fca5a5">Issue Flags</text>
  <!-- Issue categories -->
  <text x="60" y="196" font-family="monospace" font-size="10" fill="#60a5fa">REVIEW CATEGORIES</text>
  <rect x="60" y="206" width="200" height="30" rx="5" fill="#ef4444" opacity="0.15" stroke="#ef4444" stroke-width="0.5"/>
  <text x="76" y="225" font-family="monospace" font-size="10" fill="#fca5a5">⚠ Missing Reversals</text>
  <rect x="272" y="206" width="200" height="30" rx="5" fill="#ef4444" opacity="0.15" stroke="#ef4444" stroke-width="0.5"/>
  <text x="288" y="225" font-family="monospace" font-size="10" fill="#fca5a5">⚠ Incorrect Accounts</text>
  <rect x="484" y="206" width="200" height="30" rx="5" fill="#fbbf24" opacity="0.15" stroke="#fbbf24" stroke-width="0.5"/>
  <text x="500" y="225" font-family="monospace" font-size="10" fill="#fcd34d">⚠ Accrual Mismatch</text>
  <rect x="60" y="244" width="200" height="30" rx="5" fill="#fbbf24" opacity="0.15" stroke="#fbbf24" stroke-width="0.5"/>
  <text x="76" y="263" font-family="monospace" font-size="10" fill="#fcd34d">⚠ Wrong Activity Period</text>
  <rect x="272" y="244" width="200" height="30" rx="5" fill="#fbbf24" opacity="0.15" stroke="#fbbf24" stroke-width="0.5"/>
  <text x="288" y="263" font-family="monospace" font-size="10" fill="#fcd34d">⚠ Incorrect Classes</text>
  <rect x="484" y="244" width="200" height="30" rx="5" fill="#22c55e" opacity="0.15" stroke="#22c55e" stroke-width="0.5"/>
  <text x="500" y="263" font-family="monospace" font-size="10" fill="#86efac">✓ Journal Anomalies</text>
  <!-- Code snippet -->
  <rect x="60" y="294" width="680" height="140" rx="8" fill="#0f172a"/>
  <text x="76" y="314" font-family="monospace" font-size="11" fill="#60a5fa">import duckdb</text>
  <text x="76" y="330" font-family="monospace" font-size="11" fill="#7dd3fc">con = duckdb.connect()</text>
  <text x="76" y="346" font-family="monospace" font-size="11" fill="#86efac">issues = con.execute(</text>
  <text x="100" y="362" font-family="monospace" font-size="11" fill="#fbbf24">  "SELECT * FROM gl_entries WHERE accrual_reversal_flag = 1"</text>
  <text x="76" y="378" font-family="monospace" font-size="11" fill="#86efac">).df()</text>
  <text x="60" y="436" font-family="monospace" font-size="9" fill="#60a5fa" opacity="0.6">* Visuals use recreated/anonymized data to protect confidential business information.</text>
</svg>